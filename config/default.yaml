# Default CMSP experiment configuration

# Task parameters
m: 4                # number of atomic subtasks
k: 4                # bits per subtask
n: 16               # total task bits (m * k)

# Model parameters
width: 128
depth: 3
activation: relu
use_layernorm: false

# Training parameters
task_codes: [[0], [1], [2], [3], [0, 1, 2, 3]]
samples_per_task: 2000
steps: 200000
lr: 0.001
seed: 0
dtype: float32
eval_every: 100
checkpoint_every: 0         # 0 = disabled
checkpoint_steps: []        # specific steps to checkpoint

# LLC estimation parameters
llc:
  num_chains: 10
  num_draws: 500
  num_burnin_steps: 100
  num_steps_bw_draws: 1
  learning_rate: 0.0001
  localization: 0.0
  samples_per_code: 2000
  batch_size: 256
  seed: 42
